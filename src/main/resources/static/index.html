<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BandSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#09090b] text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-2xl flex-col justify-center px-4 py-8">
      <section class="rounded-lg border border-white/10 bg-slate-950/80 p-6 shadow-xl shadow-cyan-950/40">
        <p class="text-sm font-semibold uppercase tracking-[0.22em] text-cyan-300">BandSync</p>
        <h1 class="mt-3 text-4xl font-black text-white">Live room sync</h1>
        <div class="mt-6 grid gap-4">
          <label class="grid gap-2 text-sm text-slate-300">
            Room ID
            <input id="roomInput" value="404" class="rounded-lg border border-white/10 bg-slate-900 px-4 py-3 text-white outline-none focus:border-cyan-300" />
          </label>
          <label class="grid gap-2 text-sm text-slate-300">
            Name
            <input id="nameInput" value="Player" class="rounded-lg border border-white/10 bg-slate-900 px-4 py-3 text-white outline-none focus:border-cyan-300" />
          </label>
          <label class="grid gap-2 text-sm text-slate-300">
            Role
            <select id="roleSelect" class="rounded-lg border border-white/10 bg-slate-900 px-4 py-3 text-white outline-none focus:border-cyan-300">
              <option value="KEYS">Keys</option>
              <option value="DRUMS">Drums</option>
              <option value="BASS">Bass</option>
              <option value="VOCALS">Vocals</option>
            </select>
          </label>
          <div class="grid gap-3 sm:grid-cols-2">
            <button id="hostButton" class="rounded-lg bg-amber-300 px-5 py-3 font-bold text-slate-950">Join as Host</button>
            <button id="memberButton" class="rounded-lg bg-cyan-400 px-5 py-3 font-bold text-slate-950">Join as Client</button>
          </div>
        </div>
      </section>
    </main>
    <script>
      const roomInput = document.getElementById('roomInput');
      const nameInput = document.getElementById('nameInput');
      const roleSelect = document.getElementById('roleSelect');
      function go(path) {
        const params = new URLSearchParams({
          room: roomInput.value.trim() || '404',
          name: nameInput.value.trim() || 'Player',
          role: roleSelect.value
        });
        window.location.href = `${path}?${params.toString()}`;
      }
      document.getElementById('hostButton').addEventListener('click', () => go('/host'));
      document.getElementById('memberButton').addEventListener('click', () => go('/member'));
    </script>
  </body>
</html>
